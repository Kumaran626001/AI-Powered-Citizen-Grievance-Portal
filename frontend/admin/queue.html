<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Queue - Grievance Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body">
    <div class="tricolor-bar"></div>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" alt="Emblem" class="sidebar-logo">
            <h2>GovConnect</h2>
        </div>
        <ul class="nav-links">
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Home Dashboard</a></li>
            <li><a href="complaints.html"><i class="fas fa-list"></i> All Complaints</a></li>
            <li><a href="queue.html" class="active"><i class="fas fa-exclamation-triangle"></i> Priority Queue</a></li>
            <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div class="admin-hamburger" id="admin-hamburger">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="header-title">
                    <h1>AI Prioritized Queue</h1>
                    <p>Complaints sorted by ML-predicted priority score</p>
                </div>
            </div>
        </header>

        <div style="display:flex; justify-content:flex-end; margin-bottom:1.5rem;">
            <div class="view-toggle">
                <button class="btn-toggle active" id="btnViewIndividual" onclick="setViewMode(false)"><i class="fas fa-user"></i> Individual</button>
                <button class="btn-toggle" id="btnViewGrouped" onclick="setViewMode(true)"><i class="fas fa-layer-group"></i> Grouped</button>
            </div>
        </div>

        <div class="queue-container" id="priorityQueueContainer">
            <!-- Cards injected via JS -->
        </div>
    </div>

    <!-- Action Modal & Details View -->
    <div id="actionModal" class="modal hidden">
        <div class="modal-content" style="max-width:600px; max-height:90vh; overflow-y:auto; border-radius:12px; box-shadow:var(--shadow-lg);">
            <span class="close-modal">&times;</span>
            <h2 style="margin-bottom:1rem; color:var(--accent-light);">Grievance Details & Action</h2>
            <p style="margin-bottom:1rem; font-size:0.95rem; color:var(--text-secondary);">Ticket ID: <strong id="modalTicketId" style="color:var(--text-primary);"></strong></p>
            
            <!-- Dynamic detailed information injected via JS -->
            <div id="modalComplaintDetails"></div>
            
            <form id="actionForm">
                <input type="hidden" id="actionTicketId">
                <div class="form-group">
                    <label for="updateStatus" style="font-weight:600;">Update Status</label>
                    <select id="updateStatus" name="status" required>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="actionNotes" style="font-weight:600;">Action Taken / Resolution Notes</label>
                    <textarea id="actionNotes" name="action_notes" rows="3" required placeholder="Provide details of actions taken..." style="font-family:inherit;"></textarea>
                </div>
                <button type="submit" class="btn-primary full-width" style="border-radius:6px;">Submit Update</button>
            </form>
        </div>
    </div>
    
    <script src="../js/app.js"></script>
    <script>
        if (!sessionStorage.getItem("admin_id")) {
            window.location.href = "login.html";
        }
        document.addEventListener("DOMContentLoaded", () => {
            loadPriorityQueue();
        });
        
        function setViewMode(isGrouped) {
            document.getElementById('btnViewIndividual').classList.toggle('active', !isGrouped);
            document.getElementById('btnViewGrouped').classList.toggle('active', isGrouped);
            window.toggleGroupedQueueMode(isGrouped);
        }
    </script>
</body>
</html>
