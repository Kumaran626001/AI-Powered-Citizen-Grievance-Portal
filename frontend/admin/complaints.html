<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Complaints - Grievance Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body">
    <div class="tricolor-bar"></div>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" alt="Emblem" class="sidebar-logo">
            <h2>GovConnect</h2>
        </div>
        <ul class="nav-links">
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Home Dashboard</a></li>
            <li><a href="complaints.html" class="active"><i class="fas fa-list"></i> All Complaints</a></li>
            <li><a href="queue.html"><i class="fas fa-exclamation-triangle"></i> Priority Queue</a></li>
            <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div class="admin-hamburger" id="admin-hamburger">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="header-title">
                    <h1>All Complaints</h1>
                    <p>Manage and track all registered grievances</p>
                </div>
            </div>
        </header>

            <div class="table-controls" style="display:flex; flex-wrap:wrap; gap:0.75rem; align-items:center;">
                <div class="view-toggle">
                    <button class="btn-toggle active" id="btnViewIndividual" onclick="setViewMode(false)"><i class="fas fa-user"></i> Individual</button>
                    <button class="btn-toggle" id="btnViewGrouped" onclick="setViewMode(true)"><i class="fas fa-layer-group"></i> Grouped</button>
                </div>
                <input type="text" id="searchBox" placeholder="Search by Ticket, Name or Keyword..." class="search-input" style="flex:1; min-width:200px;">
                <select id="filterDistrict" class="filter-select">
                    <option value="">All Districts</option>
                </select>
                <select id="filterCity" class="filter-select" disabled>
                    <option value="">All Cities/Towns</option>
                </select>
                <select id="filterCategory" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="Water">Water Supply</option>
                    <option value="Electricity">Electricity</option>
                    <option value="Public Works">Public Works</option>
                    <option value="Sanitation">Sanitation</option>
                    <option value="Health">Health</option>
                    <option value="Transport">Transport</option>
                </select>
                <select id="filterUrgency" class="filter-select">
                    <option value="">All Urgencies</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                </select>
                <select id="filterStatus" class="filter-select">
                    <option value="">All Statuses</option>
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Resolved">Resolved</option>
                </select>
                <button id="clearFiltersBtn" class="btn-outline" style="border-radius:6px; padding:0.5rem 1rem; color: var(--danger); border-color: rgba(244, 63, 94, 0.2);"><i class="fas fa-times-circle"></i> Clear Filters</button>
                <button class="btn-outline" onclick="exportToCSV()" style="border-radius:6px; padding:0.5rem 1rem;"><i class="fas fa-download"></i> Export CSV</button>
            </div>
            
            <div class="data-table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Ticket ID</th>
                            <th>Citizen Name</th>
                            <th>District</th>
                            <th>City/Town</th>
                            <th>Specific Location</th>
                            <th>Category</th>
                            <th>Urgency</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="complaintsTableBody">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
            
            <div class="pagination">
                <button id="prevPage" class="btn-page">&laquo; Prev</button>
                <span id="pageInfo">Page 1 of 1</span>
                <button id="nextPage" class="btn-page">Next &raquo;</button>
            </div>
        </div>
    </div>

    <!-- Action Modal & Details View -->
    <div id="actionModal" class="modal hidden">
        <div class="modal-content" style="max-width:600px; max-height:90vh; overflow-y:auto; border-radius:12px; box-shadow:var(--shadow-lg);">
            <span class="close-modal">&times;</span>
            <h2 style="margin-bottom:1rem; color:var(--accent-light);">Grievance Details & Action</h2>
            <p style="margin-bottom:1rem; font-size:0.95rem; color:var(--text-secondary);">Ticket ID: <strong id="modalTicketId" style="color:var(--text-primary);"></strong></p>
            
            <!-- Dynamic detailed information injected via JS -->
            <div id="modalComplaintDetails"></div>
            
            <form id="actionForm">
                <input type="hidden" id="actionTicketId">
                <div class="form-group">
                    <label for="updateStatus" style="font-weight:600;">Update Status</label>
                    <select id="updateStatus" name="status" required>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="actionNotes" style="font-weight:600;">Action Taken / Resolution Notes</label>
                    <textarea id="actionNotes" name="action_notes" rows="3" required placeholder="Provide details of actions taken..." style="font-family:inherit;"></textarea>
                </div>
                <button type="submit" class="btn-primary full-width" style="border-radius:6px;">Submit Update</button>
            </form>
        </div>
    </div>
    
    <script src="../js/app.js"></script>
    <script>
        if (!sessionStorage.getItem("admin_id")) {
            window.location.href = "login.html";
        }
        document.addEventListener("DOMContentLoaded", () => {
            loadComplaints();
        });
        
        function setViewMode(isGrouped) {
            document.getElementById('btnViewIndividual').classList.toggle('active', !isGrouped);
            document.getElementById('btnViewGrouped').classList.toggle('active', isGrouped);
            window.toggleGroupedMode(isGrouped);
        }
    </script>
</body>
</html>
